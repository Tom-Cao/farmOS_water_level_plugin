farm_water_level.settings:
  type: config_object
  label: 'Water Level Sensor settings'
  mapping:
    thingspeak_channel_id:
      type: string
      label: 'ThingSpeak Channel ID'
    thingspeak_read_api_key:
      type: string
      label: 'ThingSpeak Read API Key'
    thingspeak_field_number:
      type: integer
      label: 'ThingSpeak field number for water level'
    sync_interval:
      type: integer
      label: 'Sync interval in seconds'
    results_to_fetch:
      type: integer
      label: 'Number of results to fetch per request'

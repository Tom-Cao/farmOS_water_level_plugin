name: Water Level Sensor
description: Integrates ThingSpeak water level sensor data into farmOS, displaying readings and syncing them as logs.
type: module
package: farmOS Contrib
core_version_requirement: ^10 || ^11
dependencies:
  - farm:farm_entity
  - farm:farm_field
  - farm:farm_log
  - farm:farm_log_quantity
  - farm:farm_quantity_standard
  - log:log
  - quantity:quantity
configure: farm_water_level.settings
